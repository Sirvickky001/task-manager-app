name: TaskFlow CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/taskflow

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: taskflow/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: taskflow
      - name: Run tests
        run: npm run test:ci
        working-directory: taskflow
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: taskflow/coverage/
          retention-days: 7

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    permissions:
      contents: read
      packages: write
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (pre-scan)
        uses: docker/build-push-action@v5
        with:
          context: taskflow/
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          format: table
          exit-code: '1'
          severity: CRITICAL

      - name: Push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: taskflow/
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  update-config:
    name: Update config repo
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: Sirvickky001/argocd-main
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: config-repo

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
          else
            echo "ENV=dev" >> $GITHUB_OUTPUT
          fi

      - name: Update image tag
        run: |
          SHORT_SHA=${{ needs.build-and-push.outputs.short-sha }}
          ENV=${{ steps.env.outputs.ENV }}
          FILE="config-repo/taskflow/${ENV}/values.yaml"

          sed -i "s/tag: .*/tag: sha-${SHORT_SHA}/" "${FILE}"

          echo "Updated ${FILE}:"
          cat "${FILE}"

      - name: Commit and push
        run: |
          SHORT_SHA=${{ needs.build-and-push.outputs.short-sha }}
          ENV=${{ steps.env.outputs.ENV }}
          cd config-repo
          git config user.email "ci-bot@github.com"
          git config user.name "TaskFlow CI"
          git add taskflow/${ENV}/values.yaml
          git commit -m "chore(taskflow): update ${ENV} image to sha-${SHORT_SHA} [skip ci]"
          git push
